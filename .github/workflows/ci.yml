name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Fix workspace permissions for the container
        run: sudo chmod -R a+rwX "$GITHUB_WORKSPACE"
      - uses: coq-community/docker-coq-action@v1
        with:
          coq_version: '9.0'
          ocaml_version: '4.14-flambda'
          custom_script: |
            startGroup "Install Coq-HoTT"
              opam repo add coq-extra-dev https://coq.inria.fr/opam/extra-dev
              opam install -y coq-hott.dev
            endGroup
            startGroup "Compile"
              coqc -noinit -indices-matter -native-compiler no WeightedTower.v
            endGroup
            startGroup "Kernel check"
              coqchk -silent -o WeightedTower
            endGroup
